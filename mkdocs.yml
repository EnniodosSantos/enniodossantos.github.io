site_name: Ennio dos Santos
site_url: https://enniodossantos.github.io/

theme:
  name: material
  language: pt-BR
  logo: /gemini-svg (3).svg
  features:
    - navigation.tabs
    - navigation.sections
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue  # <--- Mude para a cor desejada (ex: blue, teal, black)
      accent: indigo   # Cor de links e botões
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue  # <--- Barra preta no modo escuro
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Sobre: sobre.md
  - Habilidades: Habilidades.md
  - Projetos: Projetos.md
  - Contato: Contato.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EnniodosSantos
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/seu-perfil
    - icon: fontawesome/solid/graduation-cap
      link: http://lattes.cnpq.br/seu-id
