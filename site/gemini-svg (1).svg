<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Caminhos Curvos (Fluxo de Dados) -->
  <path d="M100 350C175 200 225 200 300 350" stroke="#000000" stroke-width="15" stroke-linecap="round"/>
  <path d="M200 150C275 300 325 300 400 150" stroke="#000000" stroke-width="15" stroke-linecap="round"/>
  
  <!-- Linhas Retas de Conexão -->
  <line x1="100" y1="350" x2="200" y2="150" stroke="#000000" stroke-width="15" stroke-linecap="round"/>
  <line x1="200" y1="150" x2="300" y2="350" stroke="#000000" stroke-width="15" stroke-linecap="round"/>
  <line x1="300" y1="350" x2="400" y2="150" stroke="#000000" stroke-width="15" stroke-linecap="round"/>

  <!-- Nós (Pontos de Dados) -->
  <circle cx="100" cy="350" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <circle cx="200" cy="150" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <circle cx="300" cy="350" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
  <circle cx="400" cy="150" r="25" fill="#FFFFFF" stroke="#000000" stroke-width="8"/>
</svg>
